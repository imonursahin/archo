name: Release

# Fully automatic releases: bump "version" in package.json and push to master.
# CI builds the macOS installers and publishes a GitHub Release. Commits that
# don't change the version are ignored (the release for that version already
# exists), so day-to-day pushes never trigger a build.

on:
  push:
    branches: [master]
    paths: ['package.json']
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: write # needed to create the release + tag

jobs:
  release:
    runs-on: macos-latest # arm64 runner → arm64 build
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: echo "v=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Skip if this version was already released
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.ver.outputs.v }}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "v${{ steps.ver.outputs.v }} already released — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'false'
        with:
          node-version: 20

      - name: Install deps (rebuilds node-pty for the runner)
        if: steps.check.outputs.exists == 'false'
        run: npm ci

      - name: Build installers
        if: steps.check.outputs.exists == 'false'
        run: npm run dist # electron-builder without publish → dist/*.dmg, *.zip, latest-mac.yml

      - name: Publish release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.ver.outputs.v }}" \
            dist/Archo-*-arm64.dmg \
            dist/Archo-*-arm64-mac.zip \
            dist/latest-mac.yml \
            --repo "$GITHUB_REPOSITORY" \
            --title "Archo ${{ steps.ver.outputs.v }}" \
            --generate-notes

      - name: Update Homebrew cask
        if: steps.check.outputs.exists == 'false'
        env:
          DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          set -e
          VER="${{ steps.ver.outputs.v }}"
          SHA=$(shasum -a 256 dist/Archo-${VER}-arm64.dmg | awk '{print $1}')
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes"
          git clone git@github.com:imonursahin/homebrew-tap.git tap
          cd tap
          sed -i '' -E "s/^  version \".*\"/  version \"${VER}\"/" Casks/archo.rb
          sed -i '' -E "s/^  sha256 \".*\"/  sha256 \"${SHA}\"/" Casks/archo.rb
          git config user.name "Onur Şahin"
          git config user.email "31903339+imonursahin@users.noreply.github.com"
          git commit -am "archo ${VER}"
          git push
